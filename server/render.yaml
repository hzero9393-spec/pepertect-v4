services:
  - type: web
    name: pepertect-server
    runtime: node
    plan: free
    buildCommand: cd server && npm install && npm run build
    startCommand: cd server && npm run prisma:generate && node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: UPSTOX_ACCESS_TOKEN
        sync: false
      - key: UPSTOX_API_KEY
        sync: false
      - key: UPSTOX_API_SECRET
        sync: false
      - key: CORS_ORIGIN
        value: https://pepertect-v2.vercel.app
      - key: LOG_LEVEL
        value: info