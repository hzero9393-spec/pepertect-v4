services:
  - type: web
    name: pepertect-v4-ws
    env: node
    plan: free
    region: oregon
    rootDir: server
    buildCommand: npm install && npx prisma generate --schema=prisma/schema.prisma && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: CORS_ORIGIN
        value: https://pepertect-v2.vercel.app
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        value: pepertect-fallback-secret-key
      - key: BROKERAGE_PERCENT
        value: "0.0005"
      - key: MIN_BROKERAGE
        value: "20"
      - key: MAX_BROKERAGE
        value: "500"
